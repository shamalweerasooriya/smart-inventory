spring:
  application:
    name: smart-inventory-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/inventory_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/inventory-saas
          jwk-set-uri: http://localhost:8180/realms/inventory-saas/protocol/openid-connect/certs

server:
  port: 8080

logging:
  level:
    com.smartinventory: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/inventory_db

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/inventory-saas
          jwk-set-uri: http://keycloak:8180/realms/inventory-saas/protocol/openid-connect/certs
